<!DOCTYPE html>
<html>
<head>
<title>Flashcards</title>
<style>
body {
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
}

.card {
  width: 400px;
  height: 250px;
  border: 2px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  text-align: center;
  cursor: pointer;
  padding: 20px;
  border-radius: 10px;
}

button {
  margin: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>Company Acronyms Flashcards</h2>

<div class="card" onclick="flipCard()" id="card"></div>

<div>
  <button onclick="prevCard()">Previous</button>
  <button onclick="nextCard()">Next</button>
</div>

<script>
const flashcards = [
  {front: "BB", back: "Best Benefits"},
  {front: "SOS", back: "Senior Outreach Specialist – conducts screenings and applications"},
  {front: "DS", back: "Disability Specialist – handles all follow-up after application is submitted"},
  {front: "SSA", back: "Social Security Administration"},
  {front: "PC", back: "Primary Contact – main contact (parent/guardian for minors or themselves if an adult)"},
  {front: "TPC/ATPC", back: "(Authorized) Third Party Contact"},
  {front: "PHI", back: "Protected Health Information (name, DOB, address, phone number)"},
  {front: "FCC", back: "Statement that the call is recorded for quality and compliance"},
  {front: "Compass", back: "Internal software / case management system"},
  {front: "1696", back: "SSA Representative Form – paper version scanned into Compass and faxed"},
  {front: "E1696", back: "Electronic SSA Representative Form – submitted via SSA website/email for faster processing"}
];

let current = 0;
let flipped = false;

function showCard() {
  document.getElementById("card").textContent = flipped 
    ? flashcards[current].back 
    : flashcards[current].front;
}

function flipCard() {
  flipped = !flipped;
  showCard();
}

function nextCard() {
  current = (current + 1) % flashcards.length;
  flipped = false;
  showCard();
}

function prevCard() {
  current = (current - 1 + flashcards.length) % flashcards.length;
  flipped = false;
  showCard();
}

showCard();
</script>

</body>
</html>
